<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiesel AI — Create Images, Videos & Audio with AI</title>
<meta name="description" content="Fiesel AI — India's most powerful AI creative platform. Generate stunning images, videos, and audio with the power of artificial intelligence.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden;font-size:16px}
body{font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh;transition:background .4s,color .4s}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:none}
[data-theme="dark"]{
  --bg:#021a0a;--bg2:#032d10;--bg3:#04401a;--bg4:#055220;
  --surface:rgba(0,255,100,.05);--surface2:rgba(0,255,100,.10);
  --border:rgba(0,255,100,.10);--border2:rgba(0,255,100,.20);
  --text:#d4ffe0;--text2:rgba(212,255,224,.65);--text3:rgba(212,255,224,.38);
  --accent:#00c853;--accent2:#00e676;--accent3:#69f0ae;
  --glow:rgba(0,200,83,.25);--glass:rgba(2,20,8,.75);
  --nav-bg:rgba(2,15,6,.88);--shadow:0 24px 80px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f0f2ff;--bg2:#e8ebff;--bg3:#fff;--bg4:#f8f9ff;
  --surface:rgba(0,0,0,.04);--surface2:rgba(0,0,0,.07);
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#0d1220;--text2:rgba(13,18,32,.62);--text3:rgba(13,18,32,.38);
  --accent:#3b6eff;--accent2:#6b46f0;--accent3:#00b894;
  --glow:rgba(59,110,255,.14);--glass:rgba(255,255,255,.75);
  --nav-bg:rgba(240,242,255,.88);--shadow:0 24px 80px rgba(0,0,0,.12);
}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--nav-bg);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:all .3s}
.nav-logo{display:flex;align-items:center;gap:.6rem;cursor:pointer}
.nav-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 20px var(--glow)}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text)}
.nav-links{display:flex;gap:.5rem}
.nav-link{padding:.45rem .95rem;border-radius:10px;font-size:.875rem;font-weight:500;color:var(--text2);transition:all .2s;cursor:pointer}
.nav-link:hover,.nav-link.active{color:var(--text);background:var(--surface2)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.theme-btn{width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.theme-btn:hover{background:var(--surface2);color:var(--text)}
.btn-nav-primary{padding:.5rem 1.25rem;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px var(--glow);transition:all .2s;cursor:pointer}
.btn-nav-primary:hover{transform:translateY(-1px);box-shadow:0 8px 30px var(--glow)}
.hero{position:relative;min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg);padding-top:68px}
.hero-inner{position:relative;z-index:2;text-align:center;padding:2rem;max-width:920px;margin:0 auto}
.hero-h1{font-family:'Syne',sans-serif;font-size:clamp(2.6rem,7vw,5.5rem);font-weight:800;line-height:1.03;letter-spacing:-.05em;color:var(--text);margin-bottom:1.5rem}
.hero-h1 .grad{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(1rem,2vw,1.2rem);color:var(--text2);font-weight:400;max-width:560px;margin:1.5rem auto 2.5rem;line-height:1.75}
.hero-ctas{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;margin-top:2rem}
.btn-lg{padding:.9rem 2.25rem;border-radius:14px;font-size:1rem;font-weight:600;display:inline-flex;align-items:center;gap:.6rem;transition:all .25s;cursor:pointer}
.btn-primary-lg{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 36px var(--glow)}
.btn-primary-lg:hover{transform:translateY(-2px);box-shadow:0 14px 48px var(--glow)}
.btn-ghost-lg{background:var(--surface);border:1px solid var(--border2);color:var(--text);backdrop-filter:blur(12px)}
.btn-ghost-lg:hover{background:var(--surface2);border-color:var(--accent);transform:translateY(-2px)}
.hero-stats{display:flex;justify-content:center;gap:4rem;margin-top:4rem;padding-top:3rem;border-top:1px solid var(--border);flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:.75rem;color:var(--text3);margin-top:.2rem;letter-spacing:.06em;text-transform:uppercase}
@media (max-width:768px){
  .nav-links{display:none}
  .hero-h1{font-size:1.8rem}
  .hero-sub{font-size:.9rem}
  .hero-ctas{flex-direction:column}
  .btn-lg{width:100%;justify-content:center}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">✨</div>
    <div class="nav-logo-text">Fiesel <span style="background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">AI</span></div>
  </div>
  <div class="nav-links">
    <div class="nav-link active">Home</div>
    <div class="nav-link">Features</div>
    <div class="nav-link">Pricing</div>
  </div>
  <div class="nav-right">
    <button class="theme-btn">🌙</button>
    <button class="btn-nav-primary">Get Started</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <h1 class="hero-h1">Create <span class="grad">Stunning Visuals</span> With AI</h1>
    <p class="hero-sub">Generate breathtaking images, engaging videos, and immersive audio with our revolutionary AI-powered creative platform. Unleash your creativity without limits.</p>
    <div class="hero-ctas">
      <button class="btn-lg btn-primary-lg">🚀 Start Creating Free</button>
      <button class="btn-lg btn-ghost-lg">📚 Watch Demo</button>
    </div>
    <div class="hero-stats">
      <div class="stat-item">
        <div class="stat-num">100K+</div>
        <div class="stat-lbl">Active Creators</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">10M+</div>
        <div class="stat-lbl">Images Generated</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">24/7</div>
        <div class="stat-lbl">Support</div>
      </div>
    </div>
  </div>
</section>

<script>
const themeBtn = document.querySelector('.theme-btn');
const html = document.documentElement;
themeBtn.addEventListener('click', () => {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  themeBtn.textContent = newTheme === 'dark' ? '🌙' : '☀️';
});
const savedTheme = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
</script>
</body>
</html>
